<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - منظم المذاكرة</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .auth-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .auth-header h1 {
            margin: 0;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .auth-header p {
            margin: 0;
            opacity: 0.9;
            font-size: 1em;
        }

        .auth-body {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            transition: all 0.3s ease;
            direction: rtl;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #999;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .toggle-form {
            text-align: center;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .toggle-form p {
            color: #666;
            margin: 0;
        }

        .toggle-form a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }

        .toggle-form a:hover {
            text-decoration: underline;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border-right: 4px solid #c33;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border-right: 4px solid #3c3;
        }

        .success-message.show {
            display: block;
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
        }

        .password-strength-bar.weak {
            width: 33%;
            background: #ff6b6b;
        }

        .password-strength-bar.fair {
            width: 66%;
            background: #ffa500;
        }

        .password-strength-bar.strong {
            width: 100%;
            background: #51cf66;
        }

        .password-strength-text {
            font-size: 0.8em;
            margin-top: 5px;
            color: #666;
        }

        .terms-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
        }

        .terms-checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .terms-checkbox label {
            margin: 0;
            cursor: pointer;
            font-size: 0.9em;
            color: #666;
        }

        .terms-checkbox label a {
            color: #667eea;
            text-decoration: none;
        }

        .terms-checkbox label a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 10px;
            }

            .auth-body {
                padding: 20px;
            }

            .auth-header {
                padding: 20px 15px;
            }

            .auth-header h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>📚 منظم المذاكرة</h1>
                <p style="font-size: 0.9em; margin-top: 8px;">تنظيم المذاكرة بسهولة وكفاءة</p>
                <p style="margin-top: 12px; display: flex; justify-content: center; gap: 15px; font-size: 0.85em;">
                    <a href="guide.html" style="color: white; text-decoration: none; opacity: 0.9;">البدء السريع</a>
                    <span style="opacity: 0.5;">|</span>
                    <a href="about.html" style="color: white; text-decoration: none; opacity: 0.9;">حول الموقع</a>
                </p>
            </div>

            <div class="auth-body">
                <!-- Login Form -->
                <div id="loginForm" class="form-section active">
                    <h2 style="text-align: center; color: #333; margin-top: 0;">تسجيل الدخول</h2>
                    
                    <div id="loginError" class="error-message"></div>
                    
                    <form id="loginFormElement" onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label for="loginEmail">البريد الإلكتروني</label>
                            <input 
                                type="email" 
                                id="loginEmail" 
                                placeholder="بريدك@example.com" 
                                required
                            >
                        </div>

                        <div class="form-group">
                            <label for="loginPassword">كلمة المرور</label>
                            <input 
                                type="password" 
                                id="loginPassword" 
                                placeholder="أدخل كلمة مرورك" 
                                required
                            >
                        </div>

                        <button type="submit" class="btn-submit">دخول</button>
                    </form>

                    <div class="toggle-form">
                        <p>ليس لديك حساب؟ <a onclick="toggleForms()">إنشاء حساب جديد</a></p>
                    </div>
                </div>

                <!-- Register Form -->
                <div id="registerForm" class="form-section">
                    <h2 style="text-align: center; color: #333; margin-top: 0;">إنشاء حساب جديد</h2>
                    
                    <div id="registerError" class="error-message"></div>
                    <div id="registerSuccess" class="success-message"></div>
                    
                    <form id="registerFormElement" onsubmit="handleRegister(event)">
                        <div class="form-group">
                            <label for="registerName">الاسم الكامل</label>
                            <input 
                                type="text" 
                                id="registerName" 
                                placeholder="أدخل اسمك الكامل" 
                                required
                            >
                        </div>

                        <div class="form-group">
                            <label for="registerEmail">البريد الإلكتروني</label>
                            <input 
                                type="email" 
                                id="registerEmail" 
                                placeholder="بريدك@example.com" 
                                required
                            >
                        </div>

                        <div class="form-group">
                            <label for="registerPassword">كلمة المرور</label>
                            <input 
                                type="password" 
                                id="registerPassword" 
                                placeholder="أدخل كلمة مرور قوية" 
                                required
                                oninput="checkPasswordStrength()"
                            >
                            <div class="password-strength">
                                <div id="passwordStrengthBar" class="password-strength-bar"></div>
                            </div>
                            <div id="passwordStrengthText" class="password-strength-text"></div>
                        </div>

                        <div class="form-group">
                            <label for="registerConfirmPassword">تأكيد كلمة المرور</label>
                            <input 
                                type="password" 
                                id="registerConfirmPassword" 
                                placeholder="أعد إدخال كلمة المرور" 
                                required
                            >
                        </div>

                        <div class="terms-checkbox">
                            <input 
                                type="checkbox" 
                                id="agreeTerms" 
                                required
                            >
                            <label for="agreeTerms">
                                أوافق على <a href="#" onclick="event.preventDefault()">شروط الاستخدام</a>
                            </label>
                        </div>

                        <button type="submit" class="btn-submit">إنشاء حساب</button>
                    </form>

                    <div class="toggle-form">
                        <p>لديك حساب بالفعل؟ <a onclick="toggleForms()">تسجيل الدخول</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Toggle between login and register forms
        function toggleForms() {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            
            loginForm.classList.toggle('active');
            registerForm.classList.toggle('active');
            
            // Clear errors and success messages
            clearMessages();
        }

        // Clear error and success messages
        function clearMessages() {
            document.getElementById('loginError').classList.remove('show');
            document.getElementById('registerError').classList.remove('show');
            document.getElementById('registerSuccess').classList.remove('show');
        }

        // Check password strength
        function checkPasswordStrength() {
            const password = document.getElementById('registerPassword').value;
            const strengthBar = document.getElementById('passwordStrengthBar');
            const strengthText = document.getElementById('passwordStrengthText');
            
            let strength = 0;
            let text = '';
            
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            
            strengthBar.className = 'password-strength-bar';
            
            if (password.length === 0) {
                strengthBar.style.width = '0%';
                strengthText.textContent = '';
            } else if (strength <= 2) {
                strengthBar.classList.add('weak');
                strengthText.textContent = 'كلمة مرور ضعيفة 😟';
            } else if (strength <= 3) {
                strengthBar.classList.add('fair');
                strengthText.textContent = 'كلمة مرور متوسطة 👍';
            } else {
                strengthBar.classList.add('strong');
                strengthText.textContent = 'كلمة مرور قوية 🔒';
            }
        }

        // Handle login
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            
            // Validate inputs
            if (!email || !password) {
                showError(errorDiv, 'الرجاء إدخال البريد الإلكتروني وكلمة المرور');
                return;
            }
            
            // Get users from localStorage
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === email);
            
            if (!user) {
                showError(errorDiv, 'البريد الإلكتروني غير مسجل');
                return;
            }
            
            if (user.password !== password) {
                showError(errorDiv, 'كلمة المرور غير صحيحة');
                return;
            }
            
            // Login successful
            localStorage.setItem('currentUser', JSON.stringify({
                id: user.id,
                name: user.name,
                email: user.email
            }));
            
            window.location.replace('index.html');
        }

        // Handle registration
        function handleRegister(event) {
            event.preventDefault();
            
            const name = document.getElementById('registerName').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;
            const agreeTerms = document.getElementById('agreeTerms').checked;
            
            const errorDiv = document.getElementById('registerError');
            const successDiv = document.getElementById('registerSuccess');
            
            // Validate inputs
            if (!name || !email || !password || !confirmPassword) {
                showError(errorDiv, 'الرجاء ملء جميع الحقول');
                return;
            }
            
            if (name.length < 3) {
                showError(errorDiv, 'الاسم يجب أن يكون 3 أحرف على الأقل');
                return;
            }
            
            if (password.length < 6) {
                showError(errorDiv, 'كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                return;
            }
            
            if (password !== confirmPassword) {
                showError(errorDiv, 'كلمات المرور غير متطابقة');
                return;
            }
            
            if (!agreeTerms) {
                showError(errorDiv, 'يجب الموافقة على شروط الاستخدام');
                return;
            }
            
            // Check if email already exists
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            if (users.some(u => u.email === email)) {
                showError(errorDiv, 'البريد الإلكتروني مسجل بالفعل');
                return;
            }
            
            // Create new user
            const newUser = {
                id: Date.now(),
                name,
                email,
                password,
                createdAt: new Date().toISOString()
            };
            
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            
            // Update user counter
            const userCounter = parseInt(localStorage.getItem('userCounter') || '0') + 1;
            localStorage.setItem('userCounter', userCounter);
            
            // Clear form and show success message
            document.getElementById('registerFormElement').reset();
            showSuccess(successDiv, 'تم إنشاء الحساب بنجاح! سيتم تحويلك إلى صفحة تسجيل الدخول...');
            
            // Redirect to login and auto-fill email
            setTimeout(() => {
                document.getElementById('loginEmail').value = email;
                toggleForms();
            }, 2000);
        }

        // Show error message
        function showError(element, message) {
            element.textContent = message;
            element.classList.add('show');
        }

        // Show success message
        function showSuccess(element, message) {
            element.textContent = message;
            element.classList.add('show');
        }
    </script>
    
    <footer style="text-align: center; padding: 20px; color: #666; font-size: 0.9em; border-top: 1px solid #e0e0e0; margin-top: 30px;">
        <p>تم تطوير هذا الموقع بواسطة <strong>محمد احمد حسن</strong></p>
        <p style="margin-top: 5px; color: #999;">جميع الحقوق محفوظة © 2024</p>
    </footer>
</body>
</html>
